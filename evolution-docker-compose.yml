services:
  evolution-postgres:
    image: postgres:15
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolPass123
      POSTGRES_DB: evolution
    ports:
      - "5433:5432"
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: Vascodagama01
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolPass123@evolution-postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: leadflow-local
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_PREFIX_KEY: leadflow
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_CLIENT: LeadFlow
      CONFIG_SESSION_PHONE_NAME: Chrome
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
    depends_on:
      - evolution-postgres
      - evolution-redis

volumes:
  evolution_pg_data:
  evolution_redis_data:
  evolution_store:
  evolution_instances:
